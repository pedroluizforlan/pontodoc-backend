<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { color: #2c3e50; font-size: 24px; }
        .footer { margin-top: 20px; font-size: 12px; color: #7f8c8d; }
        .highlight { font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="header">Bem-vindo ao PontoDoc!</h1>
    <p>Olá, <span th:text="${name}">Usuário</span>,</p>
    <p>Seu acesso ao sistema foi criado com sucesso.</p>
    <p>
        <strong>Usuário:</strong> <span th:text="${email}"></span><br/>
        <strong>Senha Temporária:</strong> <span class="highlight" th:text="${password}"></span>
    </p>
    <div class="footer">
        Este é um e-mail automático, por favor não responda.
    </div>
</div>
</body>
</html>
